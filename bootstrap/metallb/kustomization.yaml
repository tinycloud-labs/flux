apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Assembles the MetalLB namespace and HelmRelease (operator only).
# Custom resources (IPAddressPool, L2Advertisement) live in config/
# and are applied by a separate Flux Kustomization that depends on this one,
# to ensure CRDs exist before the CRs are applied.
resources:
  - namespace.yaml
  - helmrelease.yaml
