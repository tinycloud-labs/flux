# Assembles the Loki HelmRelease, promtail syslog service, and Helm values ConfigMap.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

resources:
  - release.yaml
  - promtail-syslog-svc.yaml

configMapGenerator:
  - name: loki-values
    files:
      - values.yaml

generatorOptions:
  disableNameSuffixHash: true
