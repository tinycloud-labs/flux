apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dashboards
  namespace: flux-system
  labels:
    app.kubernetes.io/part-of: monitoring
spec:
  # Reconciles all application HelmReleases
  # Depends on helm-repos and bootstrap components being healthy first
  interval: 10m
  path: ./clusters/prod/monitoring/dashboards
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: prometheus
