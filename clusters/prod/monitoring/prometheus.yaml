apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: prometheus
  namespace: flux-system
  labels:
    app.kubernetes.io/part-of: monitoring
spec:
  # Reconciles all application HelmReleases
  # Depends on helm-repos and bootstrap components being healthy first
  interval: 10m
  path: ./clusters/prod/monitoring/prometheus
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: helm-repos
    - name: metallb-config
    - name: csi-driver-nfs
    - name: bw-secrets
