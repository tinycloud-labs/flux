apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: bw-secrets
  namespace: flux-system
  labels:
    app.kubernetes.io/component: bw-secrets
    app.kubernetes.io/part-of: bootstrap
spec:
  # Reconciles all HelmRepository objects.
  interval: 10m
  path: ./bootstrap/bw-secrets
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
