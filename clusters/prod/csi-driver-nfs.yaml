apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: csi-driver-nfs
  namespace: flux-system
  labels:
    app.kubernetes.io/component: csi-driver-nfs
    app.kubernetes.io/part-of: bootstrap
spec:
  # Deploys the NFS CSI driver. Waits for helm-repos to be healthy
  # so the HelmRepository index is available before the HelmRelease is applied.
  interval: 10m
  path: ./bootstrap/csi-driver-nfs
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: helm-repos
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: csi-driver-nfs
      namespace: flux-system
