apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: helm-repos
  namespace: flux-system
  labels:
    app.kubernetes.io/component: helm-repos
    app.kubernetes.io/part-of: bootstrap
spec:
  # Reconciles all HelmRepository objects.
  # No dependsOn needed — HelmRepositories have no prerequisites.
  interval: 10m
  path: ./bootstrap/helm-repos
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
