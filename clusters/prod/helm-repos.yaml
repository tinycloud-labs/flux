apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: helm-repos
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: namespaces
    - name: helm-repos
  path: ./flux/bootstrap/helm-repos
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
