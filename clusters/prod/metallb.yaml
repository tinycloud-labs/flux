apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: metallb
  namespace: flux-system
  labels:
    app.kubernetes.io/component: metallb
    app.kubernetes.io/part-of: bootstrap
spec:
  # Deploys the MetalLB operator (speaker + controller).
  # Waits for helm-repos so the HelmRepository index is ready.
  interval: 10m
  path: ./bootstrap/metallb
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: helm-repos
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: metallb
      namespace: flux-system
