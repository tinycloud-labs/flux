app:
  name: deemix
  image:
    repository: ghcr.io/bambanah/deemix
    pullPolicy: IfNotPresent
    tag: v4.5.2@sha256:cd53202a41e77066419af2af9e1ff68b2d68682df3698e6a5e84d9b29a12912d

  service:
    port: 80
    targetPort: 6595

  volumeMounts:
    - mountPath: /downloads
      subPath: downloads
    - mountPath: /config
      subPath: config

  env:
    - name: PUID
      value: "1000"
    - name: PGID
      value: "1000"
    - name: UMASK_SET
      value: "022"
    - name: DEEMIX_SINGLE_USER
      value: "true"


