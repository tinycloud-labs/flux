app:
  name: actualbudget
  image:
    repository: docker.io/actualbudget/actual-server
    pullPolicy: IfNotPresent
    tag: latest@sha256:1aeeb3985db55556e716dec25e08f6ce09308c2571b65cddbc6746ee6d5e0d45 # renovate: depName=docker.io/actualbudget/actual-server datasource=docker

  service:
    port: 80
    targetPort: 5006

  volumeMounts:
    - mountPath: /data
      subPath: data

  livenessProbe:
    enabled: true
    command: ["node", "src/scripts/health-check.js"]
    initialDelaySeconds: 20
    periodSeconds: 60
    timeoutSeconds: 10
    failureThreshold: 3
