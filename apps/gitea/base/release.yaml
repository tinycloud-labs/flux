apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitea

spec:
  interval: 1h0m0s
  releaseName: gitea
  dependsOn:
    - name: gitea-data

  chart:
    spec:
      chart: gitea
      version: "12.5.3"
      sourceRef:
        kind: HelmRepository
        name: gitea
        namespace: flux-system
      interval: 2h0m0s

  valuesFrom:
    - kind: ConfigMap
      name: gitea-data-values
      valuesKey: values.yaml

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitea-data
  namespace: default
spec:
  interval: 1h0m0s
  releaseName: gitea-data
  chart:
    spec:
      chart: nfspersistence
      version: "0.3.1"
      sourceRef:
        kind: HelmRepository
        name: tinycloud-labs
        namespace: flux-system
      interval: 2h0m0s
  valuesFrom:
    - kind: ConfigMap
      name: gitea-data-values
      valuesKey: data-values.yaml
