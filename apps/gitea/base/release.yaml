apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitea

spec:
  interval: 1h0m0s
  releaseName: gitea

  chart:
    spec:
      chart: gitea
      version: "0.0.7"
      sourceRef:
        kind: HelmRepository
        name: gitea-charts/gitea
        namespace: flux-system
      interval: 2h0m0s

  valuesFrom:
    - kind: ConfigMap
      name: excalidraw-values
      valuesKey: values.yaml
